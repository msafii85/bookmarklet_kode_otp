<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="description" content="Alat untuk membuat bookmarklet pengisi kode OTP otomatis dan mendekode kode QR Google Authenticator untuk mengekstrak secret key.">
<meta name="keywords" content="bookmarklet, kode otp, generator, google authenticator, 2fa, dapodik, siasn, infogtk, sdm">
<meta name="author" content="danie-lung">
<title>Bookmarklet Kode OTP</title>
<link rel="icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/2b50.png" sizes="72x72" type="image/png">

<style>
body {
    font-family: monospace, sans-serif;
    background: #f4f6f8;
    color: #333;
    padding: 20px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 40em;
    margin: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

input[type="text"] {
    margin-top: 10px;
    padding: 8px;
    font-family: monospace;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #f9f9f9;
    width: 100%;
    box-sizing: border-box;
}

button {
    margin-top: 15px;
    padding: 8px 12px;
    background: #3498db;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: monospace;
}

button:hover {
    background: #2980b9;
}

.radio-group {
    display: flex;
    gap: 12px;
    margin: 10px 0;
    flex-wrap: wrap;
}
</style>
</head>
<body>

<div class="container">

<h1>⭐ Bookmarklet Kode OTP</h1>

<input type="text" id="bookmarkletCode" placeholder="Masukkan Kode Secret">
<input type="text" id="bookmarkletNama" placeholder="Masukkan Nama Bookmarklet">

<div class="radio-group">
    <label><input type="radio" name="bmOption" value="kode2fa" checked> Dapodik</label>
    <label><input type="radio" name="bmOption" value="totp_code"> SDM</label>
    <label><input type="radio" name="bmOption" value="infogtk"> InfoGTK</label>
    <label><input type="radio" name="bmOption" value="otp"> SIASN</label>
    <label><input type="radio" name="bmOption" value="totp"> Google</label>
</div>

<button onclick="generateBookmarklet()">Generate Bookmarklet</button>

<p style="margin-top:20px">
Bookmarklet:
<a id="bookmarkletLink" href="#"></a>
</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/terser/dist/bundle.min.js"></script>

<script>
async function generateBookmarklet() {

    const code = document.getElementById("bookmarkletCode").value.trim();
    const namacode = document.getElementById("bookmarkletNama").value.trim();
    const selected2fa = document.querySelector('input[name="bmOption"]:checked').value;

    if (!code) {
        alert("Masukkan kode secret terlebih dahulu.");
        return;
    }

    if (!namacode) {
        alert("Masukkan nama bookmarklet terlebih dahulu.");
        return;
    }

    // Encode secret ke base64
    const encodedSecret = btoa(code);

    let jsCode = `

    var dummy1 = "LOGIN_SUCCESS";
    var dummy2 = "TOKEN_VALID";
    var dummy3 = "AUTH_OK";

    var jadiKey = "";
    var jotp = "${selected2fa}";

    function d(x){
        return atob(x);
    }

    function base32Decode(base32) {
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
        var base32Upper = base32.toUpperCase().replace(/=+$/, "").replace(/\\s+/g, "");
        var bits = 0;
        var value = 0;
        var output = [];

        for (var i = 0; i < base32Upper.length; i++) {
            var charIndex = alphabet.indexOf(base32Upper[i]);

            if (charIndex === -1) {
                throw new Error("Invalid Base32 character");
            }

            value = (value << 5) | charIndex;
            bits += 5;

            if (bits >= 8) {
                output.push((value >>> (bits - 8)) & 255);
                bits -= 8;
            }
        }

        return new Uint8Array(output);
    }

    function intToBuffer(num) {
        var buffer = new ArrayBuffer(8);
        var view = new DataView(buffer);

        var high = Math.floor(num / Math.pow(2, 32));
        var low = num >>> 0;

        view.setUint32(0, high);
        view.setUint32(4, low);

        return new Uint8Array(buffer);
    }

    function generateTOTP(secret, digits, period, algo) {

        digits = digits || 6;
        period = period || 30;
        algo = algo || "SHA-1";

        var key = base32Decode(secret);
        var time = Math.floor(Date.now() / 1000);
        var timeStep = intToBuffer(Math.floor(time / period));

        return crypto.subtle.importKey(
            "raw",
            key,
            {
                name: "HMAC",
                hash: { name: algo }
            },
            false,
            ["sign"]
        )
        .then(function(cryptoKey) {
            return crypto.subtle.sign("HMAC", cryptoKey, timeStep);
        })
        .then(function(hash) {

            var hmacResult = new Uint8Array(hash);
            var offset = hmacResult[hmacResult.length - 1] & 15;

            var truncatedHash = (
                ((hmacResult[offset] & 127) << 24) |
                ((hmacResult[offset + 1] & 255) << 16) |
                ((hmacResult[offset + 2] & 255) << 8) |
                (hmacResult[offset + 3] & 255)
            );

            return (
                truncatedHash % Math.pow(10, digits)
            )
            .toString()
            .padStart(digits, "0");
        });
    }

    // Secret dipindahkan ke bawah + decode base64
    setTimeout(function(){

        var secretKey = d("${encodedSecret}");

        generateTOTP(secretKey)
        .then(function(otp) {

            jadiKey = otp;

            if (jotp === "infogtk") {

                const inputs = document.querySelectorAll("#otpForm .otp-input");

                jadiKey.split("").forEach((char, index) => {
                    if (inputs[index]) {
                        inputs[index].value = char;
                    }
                });

            } else {

                var el = document.getElementById(jotp);

                if (!el) {
                    el = document.querySelector("input[name='" + jotp + "']");
                }

                if (el) {
                    el.value = otp;
                } else {
                    alert("Input OTP tidak ditemukan");
                }
            }

        })
        .catch(function(err){
            alert("Error OTP: " + err.message);
        });

    },0);

    `;

    try {

        const result = await Terser.minify(jsCode, {
            mangle: {
                toplevel: true
            },
            compress: {
                drop_console: true,
                passes: 2
            }
        });

        const bookmarklet = "javascript:(function(){" + encodeURIComponent(result.code) + "})();";

        const link = document.getElementById("bookmarkletLink");

        link.href = bookmarklet;
        link.textContent = namacode;

    } catch(err) {
        alert("Gagal minify: " + err.message);
    }
}
</script>

</body>
</html>
